<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#333333">
  <meta name="description" content="3D QR code system - encode data across six faces of a cube">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cube Code</title>
  <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="offline-banner" class="offline-banner" hidden>
    <div class="offline-orb" aria-hidden="true">🧊</div>
    <div>
      <strong>离线魔方模式</strong>
      <span>网络断开了，已缓存的功能仍可继续使用。</span>
    </div>
    <button id="offline-retry" type="button">重试</button>
  </div>

  <div id="update-banner" class="update-banner" hidden>
    <div class="update-orb" aria-hidden="true">✨</div>
    <div>
      <strong data-i18n="updateReadyTitle">发现新版本</strong>
      <span data-i18n="updateReadyMessage">点击刷新，立即使用最新魔方码。</span>
    </div>
    <button id="update-refresh" type="button" data-i18n="updateRefresh">刷新</button>
    <button id="update-dismiss" type="button" class="ghost" data-i18n="updateLater">稍后</button>
  </div>
  <header>
    <h1 id="title">魔方码</h1>
    <p class="subtitle" id="subtitle">3D 二维码 — 6 倍数据容量</p>
    <button id="lang-switch" class="lang-btn">EN</button>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab active" data-tab="encode" id="tab-encode">编码</button>
      <button class="tab" data-tab="decode" id="tab-decode">解码</button>
    </nav>

    <section id="encode" class="tab-content active">
      <textarea id="input-data" rows="3"></textarea>
      <div id="capacity-hint" class="capacity-hint"></div>
      <details class="encode-options">
        <summary data-i18n="encodeOptions">生成选项</summary>
        <div class="selectors-row">
          <div class="face-count-selector">
            <label for="face-count" data-i18n="faceCount">面数:</label>
            <select id="face-count">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6" selected>6</option>
            </select>
          </div>
          <div class="independent-mode">
            <label>
              <input type="checkbox" id="independent-mode">
              <span data-i18n="independentMode">独立模式</span>
            </label>
          </div>
          <div class="error-level-selector">
            <label for="error-level" data-i18n="errorLevel">纠错:</label>
            <select id="error-level">
              <option value="L">L</option>
              <option value="M" selected>M</option>
              <option value="Q">Q</option>
              <option value="H">H</option>
            </select>
          </div>
        </div>
      </details>
      <button id="btn-encode">生成魔方码</button>
      <div id="encode-toolbar" class="toolbar" style="display:none">
        <button id="btn-cross" data-i18n="viewCross">十字展开图</button>
        <button id="btn-single" data-i18n="viewSingle">逐面查看</button>
        <button id="btn-save" data-i18n="saveImage">保存图片</button>
        <button id="btn-sticker-pack" data-i18n="stickerPack">三阶魔方贴纸</button>
        <details class="toolbar-more">
          <summary data-i18n="displayOptions">外观/高级</summary>
          <label class="net-layout-selector">
            <span data-i18n="netLayout">展开图</span>
            <select id="net-layout">
              <option value="classic" data-i18n="netClassic">经典十字</option>
              <option value="windmill" data-i18n="netWindmill">风车</option>
              <option value="stair" data-i18n="netStair">阶梯</option>
              <option value="snake" data-i18n="netSnake">蛇形</option>
              <option value="tower" data-i18n="netTower">塔式</option>
            </select>
          </label>
          <button id="btn-color-mode" data-i18n="modeColorful">炫彩</button>
          <button id="btn-icon" data-i18n="addIcon">添加图标</button>
          <button id="btn-empty-face" data-i18n="emptyFaceImage" style="display:none">空面图片</button>
          <button id="btn-material" data-i18n="standardMaterial">标准材质</button>
          <div id="gene-color-picker" class="gene-color-picker" style="display:none">
            <button class="gene-color-btn active" data-color="purple" style="--gene-color:#7C2DFF" title="贪（紫色）">贪</button>
            <button class="gene-color-btn" data-color="red" style="--gene-color:#E7352A" title="嗔（红色）">嗔</button>
            <button class="gene-color-btn" data-color="blue" style="--gene-color:#0F766E" title="痴（蓝绿色）">痴</button>
          </div>
        </details>
      </div>
      <input type="file" id="icon-input" accept="image/*" style="display:none">
      <input type="file" id="empty-face-input" accept="image/*" style="display:none">
      <div id="single-container" class="single-face" style="display:none">
        <div id="single-qr"></div>
        <div class="single-face-nav">
          <button id="btn-prev">&lt;</button>
          <span class="face-counter" id="face-counter">1 / 6</span>
          <button id="btn-next">&gt;</button>
        </div>
      </div>
      <div id="cube-container" class="cube-container" style="display:none">
        <div id="cube-3d"></div>
        <p class="rotate-hint" id="rotate-hint">拖拽旋转立方体</p>
        <div class="face-nav">
          <button id="snap-front" data-face="front" data-i18n="faceFront">前</button>
          <button id="snap-back" data-face="back" data-i18n="faceBack">后</button>
          <button id="snap-top" data-face="top" data-i18n="faceTop">上</button>
          <button id="snap-bottom" data-face="bottom" data-i18n="faceBottom">下</button>
          <button id="snap-left" data-face="left" data-i18n="faceLeft">左</button>
          <button id="snap-right" data-face="right" data-i18n="faceRight">右</button>
        </div>
        <div id="rubik-controls" class="rubik-controls" hidden>
          <div class="rubik-controls-head">
            <strong data-i18n="rubikTurns">双手转动</strong>
            <span data-i18n="rubikTurnHint">左侧拖拽调视角；右侧三条滑槽转上/中/下层</span>
          </div>
          <div class="rubik-hand-guide" aria-hidden="true">
            <div class="rubik-hand-zone rubik-hand-zone-left">
              <span data-i18n="rubikLeftHand">左手：转视角</span>
            </div>
            <div class="rubik-hand-zone rubik-hand-zone-right">
              <span data-i18n="rubikRightHand">右手：滑动层</span>
            </div>
          </div>
          <div class="rubik-layer-pad" role="group" aria-label="Rubik horizontal layer swipe controls">
            <button type="button" class="rubik-layer-lane" data-rubik-layer="1">
              <span data-i18n="rubikLayerTop">上层</span><small>← / →</small>
            </button>
            <button type="button" class="rubik-layer-lane" data-rubik-layer="0">
              <span data-i18n="rubikLayerMiddle">中层</span><small>← / →</small>
            </button>
            <button type="button" class="rubik-layer-lane" data-rubik-layer="-1">
              <span data-i18n="rubikLayerBottom">下层</span><small>← / →</small>
            </button>
          </div>
          <details class="rubik-debug-turns">
            <summary data-i18n="rubikMoreTurns">更多按钮</summary>
            <div class="rubik-turn-grid" role="group" aria-label="Rubik layer turns">
              <button type="button" class="rubik-turn-btn" data-turn="U">U</button>
              <button type="button" class="rubik-turn-btn" data-turn="D">D</button>
              <button type="button" class="rubik-turn-btn" data-turn="L">L</button>
              <button type="button" class="rubik-turn-btn" data-turn="R">R</button>
              <button type="button" class="rubik-turn-btn" data-turn="F">F</button>
              <button type="button" class="rubik-turn-btn" data-turn="B">B</button>
            </div>
          </details>
          <div class="rubik-actions">
            <button type="button" class="rubik-reverse-btn" data-rubik-action="reverse" data-i18n="rubikReverse">反向</button>
            <button type="button" class="rubik-scramble-btn" data-rubik-action="scramble" data-i18n="rubikScramble">随机打乱</button>
          </div>
        </div>
      </div>
      <div id="cross-container" style="display:none"></div>
      <div id="qr-output" class="qr-grid"></div>
    </section>

    <section id="decode" class="tab-content">
      <div class="decode-mode-switch" role="group" aria-label="扫码模式">
        <button id="btn-cube-mode" class="active" type="button" data-i18n="cubeQrScan">魔方码扫描</button>
        <button id="btn-plain-mode" type="button" data-i18n="plainQrScan">普通二维码</button>
      </div>
      <p id="decode-mode-hint" class="mode-hint">魔方码需要扫齐各面后重组；普通二维码扫到即显示。</p>
      <div class="toolbar decode-actions">
        <button id="btn-scan-mode" data-i18n="quickScan">快速扫描</button>
        <button id="btn-upload" data-i18n="uploadImage">上传图片</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <div id="scanner-area">
        <video id="camera-feed" autoplay playsinline></video>
        <canvas id="scan-canvas" style="display:none"></canvas>
        <div id="quickscan-overlay" class="quickscan-overlay" style="display:none"></div>
      </div>
      <p class="quickscan-hint" id="quickscan-hint" style="display:none"></p>
      <div id="scan-status">
        <p><span id="scan-label">已扫描</span>: <span id="scan-count">0 / 6</span></p>
        <div id="scanned-faces" class="face-indicators"></div>
      </div>
      <button id="btn-decode">重组数据</button>
      <button id="btn-reset" data-i18n="resetScan" style="margin-top:0.4rem;padding:0.5rem;width:100%;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;font-size:0.9rem">重新扫描</button>
      <div class="decoded-card">
        <div id="decoded-output"></div>
        <button id="btn-copy-output" class="copy-output" type="button" data-i18n="copyResult" hidden>复制结果</button>
      </div>
      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </section>
  </main>
  <footer class="app-footer">
    <button id="app-version" class="version-pill" type="button" title="版本信息"></button>
  </footer>


  <div id="external-link-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="external-link-title">
      <h2 id="external-link-title" data-i18n="externalLinkTitle">打开外部链接？</h2>
      <p id="external-link-message" class="modal-message"></p>
      <dl class="link-detail-list">
        <div><dt data-i18n="linkScheme">协议</dt><dd id="external-link-scheme"></dd></div>
        <div><dt data-i18n="linkHost">目标</dt><dd id="external-link-host"></dd></div>
        <div id="external-link-fallback-row" hidden><dt data-i18n="linkFallback">Fallback</dt><dd id="external-link-fallback"></dd></div>
      </dl>
      <p id="external-link-warning" class="modal-warning"></p>
      <div class="modal-actions">
        <button id="external-link-cancel" type="button" data-i18n="cancelOpen">取消</button>
        <button id="external-link-fallback-open" type="button" data-i18n="openFallback" hidden>打开备用网页</button>
        <button id="external-link-confirm" type="button" data-i18n="confirmOpen">确认打开</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
